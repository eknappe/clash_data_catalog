# CLaSH Dataset Catalog
# =====================
# This file is the source of truth for the dataset catalog.
# Add one entry per dataset following the structure below.
# Run python build.py after any changes to regenerate the site.
#
# Required fields: id, name, description, pi, institution, observatories,
#                  data_type, collection_start, data_level, collection_status
# All other fields are optional but encouraged.
#
# id format: DS001, DS002, etc. — must be unique

datasets:

  - id: DS001
    name: "SoCal Lidar Campaign 2024"
    description: >
      Airborne lidar campaign conducted in February 2024 over the San Gabriel Mountains in Southern
      California. Data includes high-resolution digital elevation models (DEMs) and point clouds.
    pi: "Fernando Alonso"
    institution: "University of Southern California"
    personnel:
      - "Carlos Sainz"
      - "Oscar Piastri"
    observatories:
      - "SoCal"
      - "Alaska"
    data_type: Airborne
    instrument: "some cool instrument"
    parameters_measured:
      - "DEM"
    field_site: "San Gabriel Mountains, CA"
    spatial:
      type: bboxes
      boxes:
        - {north: 34.5, south: 34.0, east: -118.0, west: -118.5}
    collection_start: "2024-02-10"
    collection_end: "2024-02-14"
    temporal_resolution: "Single campaign"
    spatial_resolution: "0.5 m"
    format: "GeoTIFF"
    size_gb: 10
    data_level: "L2: Quality Controlled"
    collection_status: Complete
    data_location: "/data/socal/lidar/2024_sangabriel/"
    access_notes: "Contact F1 for access."
    doi: ""
    date_added: "2024-03-15"
    notes: >
      snazzy notes here about the equiment, data quality, etc.

